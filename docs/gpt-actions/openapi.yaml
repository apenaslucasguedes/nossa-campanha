openapi: 3.1.0
info:
  title: Relicário — Actions do GPT Mestre (fase 1)
  version: 2.0.0
  description: Primeira fase da conexão do GPT Mestre com o Relicário. Expõe somente leitura do snapshot multicampanha e solicitação de rolagem, autenticadas por uma chave de conexão vinculada a uma única campanha.
servers:
  - url: https://advdjsleblaosiagmrny.supabase.co/functions/v1
    description: Projeto Supabase de produção (Minha Campanha).
security:
  - relicarioGptKey: []
paths:
  /campaign-snapshot:
    post:
      operationId: getCampaignSnapshot
      summary: Consultar o snapshot completo da campanha vinculada à chave
      description: Obtém o estado atual da campanha vinculada à chave, incluindo contexto narrativo, região, sessão, personagens, combate, rolagens e eventos recentes. Use antes de narrar ou verificar mudanças.
      responses:
        '200': { $ref: '#/components/responses/CampaignSnapshotSuccess' }
        default: { $ref: '#/components/responses/ApiError' }
  /request-dice-roll:
    post:
      operationId: requestDiceRoll
      summary: Solicitar que um jogador role um teste no site
      description: Cria uma solicitação de rolagem para um personagem da campanha. O GPT apenas solicita o teste; o jogador deve realizar a rolagem no Relicário antes que o resultado seja consultado.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequestDiceRollRequest' }
      responses:
        '200': { $ref: '#/components/responses/RequestDiceRollSuccess' }
        default: { $ref: '#/components/responses/ApiError' }
components:
  securitySchemes:
    relicarioGptKey:
      type: apiKey
      in: header
      name: X-Relicario-Key
      description: "Chave de conexão de uma campanha, com permissões fechadas e revogável pelo administrador. Nunca use a anon key do Supabase, a service_role, um JWT de usuário fixo ou uma senha como valor desta chave; o servidor armazena somente o hash da chave."
  responses:
    CampaignSnapshotSuccess:
      description: Snapshot atual e completo da campanha vinculada à chave.
      content: { application/json: { schema: { $ref: '#/components/schemas/CampaignSnapshotResponse' } } }
    RequestDiceRollSuccess:
      description: Solicitação de rolagem registrada; aguarda o jogador rolar no site.
      content: { application/json: { schema: { $ref: '#/components/schemas/RequestDiceRollResponse' } } }
    ApiError:
      description: Erro estável da API.
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiFailure' } } }
  schemas:
    Uuid:
      type: string
      format: uuid
    ApiFailure:
      type: object
      additionalProperties: false
      required: [ok, code, message]
      properties:
        ok: { const: false }
        code:
          type: string
          enum: [UNAUTHENTICATED, FORBIDDEN, CAMPAIGN_NOT_FOUND, INVALID_ACTION, INVALID_TARGET, LIMIT_EXCEEDED, CONFLICT, MIGRATION_REQUIRED]
        message: { type: string }
        details: { type: object, additionalProperties: true, properties: {} }
    AttributeName:
      type: string
      enum: [strength, agility, intellect, presence, instinct]
    SpecialtyName:
      type: string
      enum: [Atletismo, Acrobacia, Furtividade, Investigação, Percepção, Sobrevivência, Medicina, Persuasão, Intimidação, História, Arcanismo, Performance, Rastreamento, Alquimia]
    CampaignContext:
      type: object
      additionalProperties: true
      required: [id, name, status, current_region_id]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        name: { type: string }
        status: { type: string }
        premise: { type: string }
        current_summary: { type: string }
        current_region_id: { oneOf: [{ type: string }, { type: 'null' }] }
        last_session_summary: { type: string }
        active_objectives: { type: array, items: { type: string } }
        important_notes: { type: string }
    ActiveSession:
      oneOf:
        - type: object
          additionalProperties: true
          required: [id, number, status]
          properties:
            id: { $ref: '#/components/schemas/Uuid' }
            number: { type: integer }
            title: { type: string }
            status: { type: string }
        - { type: 'null' }
    RevealedLocation:
      type: object
      additionalProperties: true
      required: [id, name, region_id, revealed]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        name: { type: string }
        region_id: { type: string }
        revealed: { type: boolean }
    CharacterSnapshot:
      type: object
      additionalProperties: true
      required: [id, name, class_key]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        name: { type: string }
        class_key: { type: string }
        character_states: { oneOf: [{ type: object, additionalProperties: true, properties: {} }, { type: 'null' }] }
        character_conditions: { type: array, items: { type: object, additionalProperties: true, properties: {} } }
        character_specialties: { type: array, items: { type: object, additionalProperties: true, properties: {} } }
    ActiveCombat:
      oneOf:
        - type: object
          additionalProperties: true
          properties:
            session: { type: object, additionalProperties: true, properties: {} }
            participants: { type: array, items: { type: object, additionalProperties: true, properties: {} } }
            enemies: { type: array, items: { type: object, additionalProperties: true, properties: {} } }
        - { type: 'null' }
    RollRequestSnapshot:
      type: object
      additionalProperties: true
      required: [id, requested_character_id, status]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        requested_character_id: { $ref: '#/components/schemas/Uuid' }
        status: { type: string }
    DiceRollSnapshot:
      type: object
      additionalProperties: true
      required: [id, character_id, total]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        character_id: { $ref: '#/components/schemas/Uuid' }
        total: { type: integer }
    CampaignEventSnapshot:
      type: object
      additionalProperties: true
      required: [id, sequence, event_type, summary]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        sequence: { type: integer }
        event_type: { type: string }
        summary: { type: string }
    CampaignSnapshot:
      type: object
      additionalProperties: false
      required: [campaign, active_session, characters, locations, active_combat, pending_roll_requests, recent_dice_rolls, recent_events, last_sequence]
      properties:
        campaign: { $ref: '#/components/schemas/CampaignContext' }
        active_session: { $ref: '#/components/schemas/ActiveSession' }
        characters: { type: array, items: { $ref: '#/components/schemas/CharacterSnapshot' } }
        locations: { type: array, items: { $ref: '#/components/schemas/RevealedLocation' } }
        active_combat: { $ref: '#/components/schemas/ActiveCombat' }
        pending_roll_requests: { type: array, items: { $ref: '#/components/schemas/RollRequestSnapshot' } }
        recent_dice_rolls: { type: array, items: { $ref: '#/components/schemas/DiceRollSnapshot' } }
        recent_events: { type: array, items: { $ref: '#/components/schemas/CampaignEventSnapshot' } }
        last_sequence: { oneOf: [{ type: integer }, { type: 'null' }] }
    CampaignSnapshotResponse:
      type: object
      additionalProperties: false
      required: [ok, data]
      properties: { ok: { const: true }, data: { $ref: '#/components/schemas/CampaignSnapshot' }, summary: { type: string } }
    RequestDiceRollRequest:
      type: object
      additionalProperties: false
      required: [character_id]
      description: Informe attribute ou specialty (ou os dois). campaign_id é opcional e, se enviado, precisa corresponder à campanha vinculada à chave.
      properties:
        campaign_id: { $ref: '#/components/schemas/Uuid' }
        character_id: { $ref: '#/components/schemas/Uuid' }
        attribute: { $ref: '#/components/schemas/AttributeName' }
        specialty: { $ref: '#/components/schemas/SpecialtyName' }
        modifier: { type: integer, minimum: -10, maximum: 10 }
        reason: { type: string, maxLength: 240 }
        difficulty: { type: integer, minimum: 1, maximum: 30 }
    RollRequestResult:
      type: object
      additionalProperties: true
      required: [id, campaign_id, requested_character_id, status]
      properties:
        id: { $ref: '#/components/schemas/Uuid' }
        campaign_id: { $ref: '#/components/schemas/Uuid' }
        requested_character_id: { $ref: '#/components/schemas/Uuid' }
        attribute: { oneOf: [{ $ref: '#/components/schemas/AttributeName' }, { type: 'null' }] }
        specialty: { oneOf: [{ $ref: '#/components/schemas/SpecialtyName' }, { type: 'null' }] }
        difficulty: { oneOf: [{ type: integer }, { type: 'null' }] }
        status: { type: string }
    RequestDiceRollResponse:
      type: object
      additionalProperties: false
      required: [ok, data]
      properties: { ok: { const: true }, data: { $ref: '#/components/schemas/RollRequestResult' }, summary: { type: string } }
